<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300&display=swap" rel="stylesheet">
  <script src="/js/scripts.js"></script>
  <title>Previsão do tempo</title>
</head>

<body>
  <div class="caixa-maior">
    <input class="input-cidade" placeholder="Digite o nome da Cidade">

    <button onclick="cliqueiNoBotao()">
      <img class="lupa" src="/assets/find.svg" alt="lupa de busca">
    </button>

    <div class="caixa-media">
      <h2 class="cidade">Tempo em - -</h2>
      <p class="temp">- - °C</p>

      <div class="caixa-menor">
        <img class="icone" src="/assets/04n.png" alt="condições do clima">
        <p class="descricao">Nuvens dispersas</p>
      </div>

      <p class="umidade">Umidade: - -%</p>
    </div>

  </div>

</body>

</html>
